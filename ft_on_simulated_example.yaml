description: RoboVLMs AMLT template (reproducible robovlms env on cluster)

env_defaults:
  NODES: 1
  GPUS: 2
  MEM: 80
  JOB_NAME: robovlms-calvin
  REPO_URL: https://github.com/Penation/RoboVLMs.git
  REPO_REF: main
  REPO_DIR: /tmp/RoboVLMs
  TRAIN_CONFIG: configs/calvin_finetune/train_kosmos_full_calvin_amlt.json
  LOG_DIR: /mnt/wangxiaofa/robovlms_logs

target:
  service: sing
  workspace_name: wsgcrrbt
  name: msrresrchbasicvc

storage:
  my_output:
    storage_account_name: azsussc
    container_name: v-wangxiaofa
    mount_dir: /mnt/wangxiaofa
  data:
    storage_account_name: azsussc
    container_name: v-wangxiaofa
    mount_dir: /mnt/robotdata
    is_output: false

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - rm -rf ${REPO_DIR}
    - git clone ${REPO_URL} ${REPO_DIR}
    - git -C ${REPO_DIR} checkout ${REPO_REF}
    - conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/main
    - conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/r
    - conda env remove -n robovlms -y || true
    - conda env create -n robovlms -f ${REPO_DIR}/envs/robovlms.amlt.yml
    - conda run --name robovlms pip install -e ${REPO_DIR}
    - test -d ${REPO_DIR}/calvin || git clone --recurse-submodules https://github.com/mees/calvin.git ${REPO_DIR}/calvin
    - git -C ${REPO_DIR}/calvin checkout fa03f01f19c65920e18cf37398a9ce859274af76
    - git -C ${REPO_DIR}/calvin submodule update --init --recursive
    - conda run --name robovlms pip install -e ${REPO_DIR}/calvin/calvin_env
    - conda run --name robovlms pip install -e ${REPO_DIR}/calvin/calvin_models --no-deps
    - conda run --name robovlms pip install moviepy==1.0.3 termcolor==2.4.0
    - conda run --name robovlms python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='microsoft/kosmos-2-patch14-224', local_dir='${REPO_DIR}/.vlms/kosmos-2-patch14-224')"
    - conda run --name robovlms python -c "import torch, hydra, pybullet, pyrender; print('torch', torch.__version__, 'cuda', torch.cuda.is_available())"

code:
  local_dir: ./envs

data:
  storage_id: my_output

jobs:
  - name: $JOB_NAME
    sku: ${NODES}x${MEM}G${GPUS}-A100
    process_count_per_node: ${GPUS}
    sla_tier: Standard
    execution_mode: basic
    identity: managed
    submit_args:
      env:
        AMLT_DOCKERFILE_TEMPLATE: default
        _AZUREML_SINGULARITY_JOB_UAI: /subscriptions/3289a5dd-b901-4b63-9562-bbbdfffba9de/resourcegroups/ws/providers/Microsoft.ManagedIdentity/userAssignedIdentities/wsgcrrbt-identity
        SHARED_MEMORY_PERCENT: 0.5

    command:
      - pwd
      - nvidia-smi
      - cd ${REPO_DIR}
      - mkdir -p ${LOG_DIR}/${JOB_NAME}
      - conda run --name robovlms python -c "import torch; print('torch', torch.__version__, 'cuda', torch.cuda.is_available())"
      - conda run --name robovlms bash -lc "set -euxo pipefail; export PYTHONUNBUFFERED=1; cd ${REPO_DIR}; torchrun --nproc_per_node=$GPUS --nnodes=$NODES --node_rank=$$AZUREML_CR_NODE_RANK --master_addr=$$AZ_BATCHAI_JOB_MASTER_NODE_IP --master_port=9901 ${REPO_DIR}/main.py ${REPO_DIR}/${TRAIN_CONFIG} --exp_name ${JOB_NAME} --gpus $GPUS --num_nodes $NODES 2>&1 | tee ${LOG_DIR}/${JOB_NAME}/train_$(date +%F_%H-%M-%S).log"
